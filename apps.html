<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight App Store</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a24; color: white; }
        h1 { color: #fa1853; text-align: center; border-bottom: 1px solid #fa1853; padding-bottom: 10px;}
        
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; margin-top: 30px; }
        .app-card { background: #0f0f15; border: 1px solid #333; border-radius: 8px; padding: 15px; text-align: center; transition: 0.2s; cursor: pointer; display: flex; flex-direction: column; align-items: center;}
        .app-card:hover { border-color: #fa1853; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(250, 24, 83, 0.2); }
        .app-icon { width: 60px; height: 60px; background: #333; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #fa1853;}
        .app-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; text-align: center; word-break: break-word;}
        
        /* Modals and Overlays */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100;}
        .modal-content { background: #0f0f15; border: 1px solid #fa1853; padding: 20px; border-radius: 8px; width: 80%; max-width: 400px; position: relative; text-align: center;}
        .close-btn { position: absolute; top: 10px; right: 15px; color: #fa1853; cursor: pointer; font-size: 20px; font-weight: bold;}
        
        input, button { width: 100%; margin-top: 10px; padding: 10px; box-sizing: border-box; background: #1a1a24; border: 1px solid #333; color: white; border-radius: 4px;}
        button { background: #fa1853; border: none; cursor: pointer; font-weight: bold;}
        button:hover { background: #ff3366; }
        .btn-secondary { background: #333; }
        .btn-secondary:hover { background: #555; }

        /* Fullscreen App Iframe Overlay */
        #app-viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f15; z-index: 200; flex-direction: column;}
        #app-viewer-header { display: flex; justify-content: space-between; padding: 10px; background: #1a1a24; border-bottom: 1px solid #fa1853;}
        #app-iframe { flex-grow: 1; border: none; width: 100%; background: white;}
    </style>
</head>
<body>

    <h1>MoonLight App Store</h1>
    <div id="app-grid" class="app-grid">
        </div>

    <div id="modal-mcreate" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('modal-mcreate')">×</span>
            <h2 style="color:#fa1853; margin-top:0;">M.Create</h2>
            <p>Local Version of V.create built for Moonlight.</p>
            <input type="text" id="mcreate-name" placeholder="App Name (e.g., My Site)">
            <input type="text" id="mcreate-url" placeholder="URL (e.g., https://example.com)">
            <p style="font-size: 12px; color: #aaa;">How would you like to add this?</p>
            <button onclick="saveApp('store')">Add to Store</button>
            <button class="btn-secondary" onclick="saveApp('vm')">Add to VM and Store</button>
        </div>
    </div>

    <div id="app-viewer">
        <div id="app-viewer-header">
            <span id="viewer-title" style="font-weight: bold; color: #fa1853;">Running App</span>
            <span style="cursor: pointer; color: white;" onclick="closeApp()">Return to Store ❌</span>
        </div>
        <iframe id="app-iframe" src=""></iframe>
    </div>

    <script>
        // Pre-loaded Apps (Using safe placeholders for demonstration)
        const defaultApps = [
            { id: "mcreate", name: "M.Create", icon: "➕", type: "tool" },
            { id: "moonlight", name: "Moonlight.Client", icon: "🌙", type: "iframe", url: "https://mlc-demon-engine.vercel.app" },
            { id: "uv", name: "UV Client", icon: "🟣", type: "iframe", url: "https://holyunblocker.org/ultraviolet" },
            { id: "asteroid", name: "Asteroid", icon: "☄️", type: "iframe", url: "https://asteroid-pink.vercel.app" },
            { id: "doge", name: "Doge", icon: "🎆", type: "iframe", url: "https://astroblock.vercel.app" }
            { id: "Sakura", name: "Sakura.Client, icon: "💮", type: "iframe", url: "
        ];

        function loadApps() {
            const grid = document.getElementById('app-grid');
            grid.innerHTML = ''; 
            
            let savedApps = JSON.parse(localStorage.getItem('ashfall_mcreate_apps')) || [];
            let allApps = [...defaultApps, ...savedApps];

            allApps.forEach(app => {
                let onClickAction = app.type === 'tool' 
                    ? `openModal('modal-mcreate')` 
                    : `launchApp('${app.name}', '${app.url}')`;

                grid.innerHTML += `
                    <div class="app-card" onclick="${onClickAction}">
                        <div class="app-icon">${app.icon}</div>
                        <div class="app-title">${app.name}</div>
                    </div>
                `;
            });
        }

        // M.Create Logic
        function saveApp(destination) {
            let name = document.getElementById('mcreate-name').value;
            let url = document.getElementById('mcreate-url').value;

            if (!name || !url) return alert("Please fill out both fields!");
            if (!url.startsWith('http')) url = 'https://' + url;

            let icon = name.substring(0, 1).toUpperCase();
            let newApp = { id: Date.now(), name: name, icon: icon, type: "iframe", url: url };
            
            let savedApps = JSON.parse(localStorage.getItem('ashfall_mcreate_apps')) || [];
            savedApps.push(newApp);
            localStorage.setItem('ashfall_mcreate_apps', JSON.stringify(savedApps));

            document.getElementById('mcreate-name').value = '';
            document.getElementById('mcreate-url').value = '';
            closeModal('modal-mcreate');
            loadApps();

            if (destination === 'vm') {
                alert("App saved to store! (VM integration would load it directly into parent window)");
                launchApp(name, url);
            } else {
                alert("App added to store successfully!");
            }
        }

        // Iframe Launcher Logic
        function launchApp(name, url) {
            document.getElementById('viewer-title').innerText = name;
            document.getElementById('app-iframe').src = url;
            document.getElementById('app-viewer').style.display = 'flex';
        }

        function closeApp() {
            document.getElementById('app-viewer').style.display = 'none';
            document.getElementById('app-iframe').src = ''; // Clear it out to stop audio/video
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Initialize
        loadApps();
    </script>
</body>
</html>
